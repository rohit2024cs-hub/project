version: '3.8'
services:
  node-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-app
    ports:
      - "7000:7000"
    environment:
      - DB_HOST=doris-fe
      - DB_PORT=9030
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=shop_db
      - CH_HOST=http://clickhouse-server:8123
      - CH_USER=default
      - CH_PASSWORD=mysecretpass
      - PORT=7000
    mem_limit: 248m
    memswap_limit: 248m
    networks:
      - external-prod-network
    restart: always

networks:
  external-prod-network:
    name: prod-network
    external: true
